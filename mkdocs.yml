site_name: FairWins
site_description: Peer-to-peer wagers with friends — smart-contract escrow, oracle resolution, end-to-end encrypted terms
site_author: Chippr Robotics
site_url: https://docs.FairWins.app

repo_name: chippr-robotics/prediction-dao-research
repo_url: https://github.com/chippr-robotics/prediction-dao-research
edit_uri: edit/main/docs/

theme:
  name: material
  palette:
    # Palette toggle for light mode
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: custom
      accent: custom
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    # Palette toggle for dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: custom
      accent: custom
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.instant
    - navigation.tracking
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - navigation.top
    - search.suggest
    - search.highlight
    - content.tabs.link
    - content.code.annotation
    - content.code.copy
  icon:
    repo: fontawesome/brands/github

markdown_extensions:
  - abbr
  - admonition
  - attr_list
  - def_list
  - footnotes
  - md_in_html
  - toc:
      permalink: true
  - pymdownx.arithmatex:
      generic: true
  - pymdownx.betterem:
      smart_enable: all
  - pymdownx.caret
  - pymdownx.details
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.keys
  - pymdownx.mark
  - pymdownx.smartsymbols
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.tasklist:
      custom_checkbox: true
  - pymdownx.tilde

plugins:
  - search

nav:
  - Home: index.md
  - User Guide:
    - Overview: user-guide/overview.md
    - Getting Started: user-guide/getting-started.md
    - User Journeys: user-guide/user-journeys.md
    - Creating a Wager: user-guide/create-wager.md
    - Accepting a Wager: user-guide/accept-wager.md
    - Resolving a Wager: user-guide/resolve-wager.md
    - Private Wager Encryption: user-guide/private-market-encryption.md
    - FAQ: user-guide/faq.md
  - Developer Guide:
    - Setup: developer-guide/setup.md
    - Architecture: developer-guide/architecture.md
    - Smart Contracts: developer-guide/smart-contracts.md
    - Frontend Development: developer-guide/frontend.md
    - Encryption Architecture: developer-guide/encryption-architecture.md
    - Envelope Encryption Spec: developer-guide/envelope-encryption-spec.md
    - Ethereum Security Agent: developer-guide/ethereum-security-agent.md
    - Security Quick Start: developer-guide/ethereum-security-quickstart.md
    - Agent Configuration: developer-guide/ethereum-security-agent-configuration.md
    - Agent Examples: developer-guide/ethereum-security-agent-examples.md
    - Singleton Deployment Patterns: developer-guide/singleton-deployment-patterns.md
    - Testing: developer-guide/testing.md
    - Contributing: developer-guide/contributing.md
  - Security Testing:
    - Overview: security/index.md
    - Unit Testing: security/unit-testing.md
    - Static Analysis: security/static-analysis.md
    - Symbolic Execution: security/symbolic-execution.md
    - Fuzz Testing: security/fuzz-testing.md
    - CI/CD Configuration: security/ci-configuration.md
  - System Overview:
    - Introduction: system-overview/introduction.md
    - How It Works: system-overview/how-it-works.md
    - Privacy Mechanisms: system-overview/privacy.md
    - Roles and Tiers: system-overview/roles-and-tiers.md
    - Security Model: system-overview/security.md
    - Governance: system-overview/governance.md
    - Account Moderation Policy: system-overview/account-moderation.md
  - Architecture Decisions:
    - Overview: adr/README.md
    - ADR-001 Trail of Bits Toolchain: adr/001-trail-of-bits-toolchain.md
    - ADR-002 Integration Testing Strategy: adr/002-integration-testing-strategy.md
    - ADR-003 X-Wing Post-Quantum Encryption: adr/003-xwing-post-quantum-encryption.md
  - Research:
    - Dex v3 Integration Analysis: research/dex-v3-integration-analysis.md
    - Alternative Approaches (Appendix): research/dex-v3-alternative-approaches.md
  - Reference:
    - API Reference: reference/api.md
    - Contract Interfaces: reference/contracts.md
    - Configuration: reference/configuration.md
    - Market Activity Badges: reference/market-activity-badges.md
    - Badge Implementation Guide: reference/badge-implementation-guide.md

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/chippr-robotics/prediction-dao-research

extra_css:
