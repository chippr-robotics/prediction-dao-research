# Cache-Control is driven by this map rather than a per-location `add_header` ON PURPOSE.
# nginx only inherits `add_header` directives into a context that defines NONE of its own,
# so a `location { add_header Cache-Control ... }` block silently strips the security
# headers below (CSP, Permissions-Policy, HSTS, X-Content-Type-Options) from JS/CSS
# responses. Driving the cache policy from a map keeps every add_header at the server
# level, so the full header set applies to every response — including static assets.
# Content-hashed build assets are immutable; the SPA entry document must always revalidate
# so a new deploy is picked up promptly (never hard-cached at the edge or in the browser).
map $uri $fw_cache_control {
    default                                                       "no-cache";
    # The service worker must always revalidate — hard-caching sw.js (it ends in .js) would
    # strand clients on a stale worker. Listed BEFORE the immutable asset rule so it wins.
    "~*/sw\.js$"                                                  "no-cache";
    "~*\.(?:js|mjs|css|png|jpe?g|gif|ico|svg|woff2?|ttf|eot)$"     "public, max-age=31536000, immutable";
}

server {
    listen 8080;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Handle SPA routing - all routes should serve index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Serve the PWA manifest with the correct media type regardless of the bundled
    # mime.types version. No `add_header` here on purpose — an empty-of-add_header
    # location still inherits every server-level security header (see note below).
    location = /manifest.webmanifest {
        default_type application/manifest+json;
    }

    # --- Headers (server level only) ------------------------------------------------------
    # No location block defines its own `add_header`, so every directive here is inherited by
    # ALL responses, including the static assets matched by the cache map above.
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    # Content Security Policy (CSP) - controls what resources can be loaded
    # default-src: Base policy for unspecified directives
    # script-src: JavaScript sources (includes Cloudflare Insights for analytics with wildcard subdomain support)
    # style-src: CSS sources
    # img-src: Image sources (WalletConnect explorer API, data URIs, OpenSea image CDN (seadn.io, spec 055 collectibles), and external images)
    # font-src: Font sources
    # connect-src: XHR/fetch/WebSocket connections (includes blockchain RPCs, IPFS, WalletConnect, and Cloudflare)
    # frame-src: iFrame sources (WalletConnect verification UI)
    # script-src carries NO WebAssembly grant. Spec 034's Group Pools redesign dropped Semaphore
    # (and its in-browser Groth16 proof generation) entirely, so the bundle no longer compiles or
    # instantiates any .wasm. The narrow 'wasm-unsafe-eval' token was removed along with it, re-
    # tightening the production CSP (the broad 'unsafe-eval' has never shipped — no eval()/Function()
    # anywhere in the bundle). Guarded by src/test/nginxCspScriptSrc.test.js, which also asserts
    # nginx.conf and nginx.conf.template stay in sync (they diverged once on exactly this token).
    # connect-src: dev RPC http://localhost:8545 removed from the production policy.
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' https://*.cloudflareinsights.com; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob: https://*.seadn.io https://openseauserdata.com https://explorer-api.walletconnect.com https://explorer-api.walletconnect.org https://ipfs.fairwins.app https://gateway.pinata.cloud https://ipfs.io https://cloudflare-ipfs.com https://*.tile.openstreetmap.org; font-src 'self' data: https://fonts.gstatic.com https://fonts.googleapis.com https://fonts.reown.com; connect-src 'self' https://relay.fairwins.app https://bundler.fairwins.app https://fairwins-alto-bundler-266380754692.us-central1.run.app https://api.studio.thegraph.com https://rpc-amoy.polygon.technology https://polygon-amoy.infura.io https://polygon-bor-rpc.publicnode.com https://rpc.mordor.etccooperative.org https://etc.rivet.link https://ethereum-rpc.publicnode.com https://ethereum-sepolia-rpc.publicnode.com https://ethereum-hoodi-rpc.publicnode.com https://ipfs.fairwins.app https://gateway.pinata.cloud https://ipfs.io https://cloudflare-ipfs.com https://api.coingecko.com https://gamma-api.polymarket.com https://api.morpho.org https://api.merkl.xyz wss://relay.walletconnect.com wss://relay.walletconnect.org https://relay.walletconnect.com https://relay.walletconnect.org https://rpc.walletconnect.com https://rpc.walletconnect.org https://explorer-api.walletconnect.com https://explorer-api.walletconnect.org https://verify.walletconnect.com https://verify.walletconnect.org https://pulse.walletconnect.com https://pulse.walletconnect.org https://api.web3modal.com https://api.web3modal.org https://keys.walletconnect.com https://keys.walletconnect.org https://notify.walletconnect.com https://notify.walletconnect.org https://echo.walletconnect.com https://echo.walletconnect.org https://push.walletconnect.com https://push.walletconnect.org https://*.cloudflareinsights.com; frame-src https://verify.walletconnect.com https://verify.walletconnect.org;" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    # HSTS: force HTTPS on this host. Once every *.fairwins.app subdomain is confirmed
    # HTTPS-only, strengthen to "max-age=31536000; includeSubDomains; preload" and submit
    # the apex at https://hstspreload.org.
    add_header Strict-Transport-Security "max-age=31536000" always;
    # Least-privilege: disable powerful features the app does not use. (usb/hid/serial are
    # left unrestricted so browser-based hardware-wallet flows keep working.)
    # camera=(self): the in-app QR scanner (html5-qrcode getUserMedia) needs the camera on
    # this origin. Scoped to self so same-origin can scan while third-party iframes cannot;
    # microphone stays fully disabled (the scanner needs video only).
    add_header Permissions-Policy "accelerometer=(self), camera=(self), geolocation=(), gyroscope=(self), magnetometer=(), microphone=(), payment=(), browsing-topics=()" always;
    # Isolate the browsing context while still allowing the WalletConnect popup/redirect.
    add_header Cross-Origin-Opener-Policy "same-origin-allow-popups" always;
    # Long-cache content-hashed assets; always revalidate the SPA entry document (see map).
    add_header Cache-Control $fw_cache_control always;

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css text/xml text/javascript application/x-javascript application/xml+rss application/javascript application/json application/xml image/svg+xml application/font-woff application/font-woff2;
}
