server {
    listen 8080;
    server_name _;
    
    root /usr/share/nginx/html;
    index index.html;
    
    # Handle SPA routing - all routes should serve index.html
    location / {
        try_files $uri $uri/ /index.html;
    }
    
    # Cache static assets
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
    
    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    # Content Security Policy (CSP) - controls what resources can be loaded
    # default-src: Base policy for unspecified directives
    # script-src: JavaScript sources (includes Cloudflare Insights for analytics with wildcard subdomain support)
    # style-src: CSS sources
    # img-src: Image sources (includes WalletConnect explorer API, data URIs, and external images)
    # font-src: Font sources
    # connect-src: XHR/fetch/WebSocket connections (includes blockchain RPCs, IPFS, WalletConnect, and Cloudflare)
    # frame-src: iFrame sources (WalletConnect verification UI)
    # script-src: 'unsafe-eval' removed — the app/bundle uses no eval()/Function()/WASM.
    # connect-src: dev RPC http://localhost:8545 removed from the production policy.
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' https://*.cloudflareinsights.com; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob: https://explorer-api.walletconnect.com https://explorer-api.walletconnect.org https://ipfs.fairwins.app https://gateway.pinata.cloud https://ipfs.io https://cloudflare-ipfs.com https://*.tile.openstreetmap.org; font-src 'self' data: https://fonts.gstatic.com https://fonts.googleapis.com https://fonts.reown.com; connect-src 'self' https://rpc-amoy.polygon.technology https://polygon-amoy.infura.io https://ipfs.fairwins.app https://gateway.pinata.cloud https://ipfs.io https://cloudflare-ipfs.com https://api.coingecko.com https://gamma-api.polymarket.com wss://relay.walletconnect.com wss://relay.walletconnect.org https://relay.walletconnect.com https://relay.walletconnect.org https://rpc.walletconnect.com https://rpc.walletconnect.org https://explorer-api.walletconnect.com https://explorer-api.walletconnect.org https://verify.walletconnect.com https://verify.walletconnect.org https://pulse.walletconnect.com https://pulse.walletconnect.org https://api.web3modal.com https://api.web3modal.org https://keys.walletconnect.com https://keys.walletconnect.org https://notify.walletconnect.com https://notify.walletconnect.org https://echo.walletconnect.com https://echo.walletconnect.org https://push.walletconnect.com https://push.walletconnect.org https://*.cloudflareinsights.com; frame-src https://verify.walletconnect.com https://verify.walletconnect.org;" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    # HSTS: force HTTPS on this host. Once every *.fairwins.app subdomain is confirmed
    # HTTPS-only, strengthen to "max-age=31536000; includeSubDomains; preload" and submit
    # the apex at https://hstspreload.org.
    add_header Strict-Transport-Security "max-age=31536000" always;
    # Least-privilege: disable powerful features the app does not use. (usb/hid/serial are
    # left unrestricted so browser-based hardware-wallet flows keep working.)
    add_header Permissions-Policy "accelerometer=(), camera=(), geolocation=(), gyroscope=(), magnetometer=(), microphone=(), payment=(), browsing-topics=()" always;
    # Isolate the browsing context while still allowing the WalletConnect popup/redirect.
    add_header Cross-Origin-Opener-Policy "same-origin-allow-popups" always;
    
    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css text/xml text/javascript application/x-javascript application/xml+rss application/javascript application/json application/xml image/svg+xml application/font-woff application/font-woff2;
}
