document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

data-cu-sign=\"1\" style=\"font-size:22px;font-weight:700;font-family:'Space Grotesk',sans-serif;color:#2ECC71;margin-top:6px;\">+$642<\u002Fdiv><\u002Fdiv>\n            <div style=\"background:#FFFFFF;border:1px solid #E3E7EB;border-radius:12px;padding:12px;box-shadow:0 1px 2px rgba(31,41,51,.04);\"><span style=\"font-size:10px;letter-spacing:.04em;text-transform:uppercase;color:#5A6772;font-weight:600;\">Win Rate<\u002Fspan><div style=\"display:flex;align-items:baseline;margin-top:6px;\"><span data-cu=\"61\" style=\"font-size:22px;font-weight:700;font-family:'Space Grotesk',sans-serif;\">61<\u002Fspan><span style=\"font-size:14px;color:#5A6772;\">%<\u002Fspan><\u002Fdiv><div style=\"height:5px;border-radius:9999px;background:#E3E7EB;margin-top:8px;overflow:hidden;\"><div style=\"width:61%;height:100%;background:linear-gradient(90deg,#36B37E,#7BDCB5);\"><\u002Fdiv><\u002Fdiv><\u002Fdiv>\n            <div style=\"background:#FFFFFF;border:1px solid #E3E7EB;border-radius:12px;padding:12px;box-shadow:0 1px 2px rgba(31,41,51,.04);\"><span style=\"font-size:10px;letter-spacing:.04em;text-transform:uppercase;color:#5A6772;font-weight:600;\">Total Wagered<\u002Fspan><div data-cu=\"4180\" data-cu-pre=\"$\" style=\"font-size:22px;font-weight:700;font-family:'Space Grotesk',sans-serif;margin-top:6px;\">$4,180<\u002Fdiv><\u002Fdiv>\n            <div style=\"background:#FFFFFF;border:1px solid #E3E7EB;border-radius:12px;padding:12px;box-shadow:0 1px 2px rgba(31,41,51,.04);\"><div style=\"display:flex;justify-content:space-between;\"><span style=\"font-size:10px;letter-spacing:.04em;text-transform:uppercase;color:#5A6772;font-weight:600;\">Active<\u002Fspan><span style=\"width:7px;height:7px;border-radius:9999px;background:#4C9AFF;animation:fwpulse 1.6s ease-in-out infinite;\"><\u002Fspan><\u002Fdiv><div data-cu=\"3\" style=\"font-size:22px;font-weight:700;font-family:'Space Grotesk',sans-serif;color:#4C9AFF;margin-top:6px;\">3<\u002Fdiv><\u002Fdiv>\n          <\u002Fdiv>\n\n          <!-- wallet utility -->\n          <div style=\"background:#F7F9FA;border:1px dashed #CBD2D9;border-radius:12px;padding:10px 12px;display:flex;align-items:center;justify-content:space-between;\"><span style=\"font-size:12px;color:#5A6772;font-family:'Space Grotesk',sans-serif;\">0x0e35…c0B2<\u002Fspan><div style=\"display:flex;gap:10px;\"><span style=\"font-size:11px;color:#2A8E63;font-weight:600;\">Show QR<\u002Fspan><span style=\"font-size:11px;color:#E5533D;font-weight:600;\">Disconnect<\u002Fspan><\u002Fdiv><\u002Fdiv>\n          <div style=\"height:8px;\"><\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <!-- ======================= SPEC / NOTES ======================= -->\n    <div style=\"flex:none;width:440px;\">\n      <div style=\"display:flex;align-items:baseline;gap:8px;margin-bottom:12px;\"><span style=\"font-size:13px;font-weight:700;color:#1F2933;\">Notes<\u002Fspan><span style=\"font-size:12px;color:#5A6772;\">responsive · theming · micro-interactions · data map<\u002Fspan><\u002Fdiv>\n      <div style=\"width:440px;background:#FFFFFF;border:1px solid #E3E7EB;border-radius:8px;box-shadow:0 1px 3px rgba(0,0,0,.08);padding:24px;color:#1F2933;font-size:13px;line-height:1.6;\">\n\n        <div style=\"font-size:11px;letter-spacing:.06em;text-transform:uppercase;color:#36B37E;font-weight:700;\">Recommendation<\u002Fdiv>\n        <p style=\"margin:6px 0 0;color:#5A6772;\">Ship <strong style=\"color:#1F2933;\">Direction A (Stacked Stream)<\u002Fstrong> as the default — it reads top-to-bottom on a phone, gives the chart full width, and degrades gracefully when data is thin. Use <strong style=\"color:#1F2933;\">B<\u002Fstrong> if you want the balance to feel like the hero of the app; <strong style=\"color:#1F2933;\">C<\u002Fstrong> if you expect power users who scan many metrics at once.<\u002Fp>\n\n        <div style=\"height:1px;background:#E3E7EB;margin:18px 0;\"><\u002Fdiv>\n        <div style=\"font-size:11px;letter-spacing:.06em;text-transform:uppercase;color:#5A6772;font-weight:700;\">Hero chart — balance over time<\u002Fdiv>\n        <ul style=\"margin:8px 0 0;padding-left:18px;color:#5A6772;\">\n          <li>Source: <code style=\"background:#F7F9FA;padding:1px 5px;border-radius:4px;color:#1F2933;\">useTaxReport<\u002Fcode> WagerTransfer stream (deposit/payout/refund + usdValue + timestamp), reconciled with <code style=\"background:#F7F9FA;padding:1px 5px;border-radius:4px;color:#1F2933;\">useWalletManagement<\u002Fcode> live balances for the right edge.<\u002Fli>\n          <li>Range toggle 7D / 30D / 90D / All re-buckets the same transfer set client-side — no extra feed.<\u002Fli>\n          <li>Recharts <code style=\"background:#F7F9FA;padding:1px 5px;border-radius:4px;color:#1F2933;\">&lt;AreaChart&gt;<\u002Fcode>; line = <code style=\"background:#F7F9FA;padding:1px 5px;border-radius:4px;color:#1F2933;\">--chart-series-a<\u002Fcode>, fill = same at 0→32% alpha.<\u002Fli>\n        <\u002Ful>\n\n        <div style=\"background:#FFF8EC;border:1px solid #F5D9A6;border-radius:8px;padding:12px;margin-top:14px;\">\n          <div style=\"font-size:12px;font-weight:700;color:#9A6A12;\">⚠ Empty / low-data state (mandatory)<\u002Fdiv>\n          <p style=\"margin:4px 0 0;color:#9A6A12;font-size:12px;\">New wallets have ~0 transfers. Never fabricate a curve. Show a flat baseline with a dotted \"no history yet\" rule + CTA \"Place your first wager\". Tiles render real zeros ($0 · 0% · 0). Reveal the area fill only once ≥2 datapoints exist.<\u002Fp>\n        <\u002Fdiv>\n\n        <div style=\"height:1px;background:#E3E7EB;margin:18px 0;\"><\u002Fdiv>\n        <div style=\"font-size:11px;letter-spacing:.06em;text-transform:uppercase;color:#5A6772;font-weight:700;\">Micro-interactions (live-ish)<\u002Fdiv>\n        <ul style=\"margin:8px 0 0;padding-left:18px;color:#5A6772;\">\n          <li><strong style=\"color:#1F2933;\">Count-up<\u002Fstrong> on every summary number (cubic-ease, ~1s) on mount &amp; whenever a poll changes the value — matches the landing-band pattern.<\u002Fli>\n          <li><strong style=\"color:#1F2933;\">\"updated Ns ago\"<\u002Fstrong> ticks each second; resets + the green dot re-pulses on the 30s activity re-poll (60s site stats, 5min price).<\u002Fli>\n          <li><strong style=\"color:#1F2933;\">Pull-to-refresh<\u002Fstrong> + manual ⟳ on Balances → <code style=\"background:#F7F9FA;padding:1px 5px;border-radius:4px;color:#1F2933;\">refreshBalances()<\u002Fcode> (on-demand, no poll).<\u002Fli>\n          <li>Chart line draws in on first paint; re-polls tween the right edge — never a full reload flash.<\u002Fli>\n        <\u002Ful>\n\n        <div style=\"height:1px;background:#E3E7EB;margin:18px 0;\"><\u002Fdiv>\n        <div style=\"font-size:11px;letter-spacing:.06em;text-transform:uppercase;color:#5A6772;font-weight:700;\">Responsive reflow<\u002Fdiv>\n        <p style=\"margin:8px 0 0;color:#5A6772;\">Single column ≤480px (shown). ≥768px: identity strip spans full width, summary tiles become a 4-up row, hero chart + secondary breakdowns sit side-by-side in a 2-col grid, balances dock to a right rail. Chart keeps a ≥44px touch target on its range pills at all widths.<\u002Fp>\n\n        <div style=\"height:1px;background:#E3E7EB;margin:18px 0;\"><\u002Fdiv>\n        <div style=\"font-size:11px;letter-spacing:.06em;text-transform:uppercase;color:#5A6772;font-weight:700;\">Theming &amp; honesty<\u002Fdiv>\n        <ul style=\"margin:8px 0 0;padding-left:18px;color:#5A6772;\">\n          <li>Every surface uses CSS vars; light variant shown at far right. Chart grid/line swap via <code style=\"background:#F7F9FA;padding:1px 5px;border-radius:4px;color:#1F2933;\">--border<\u002Fcode> / <code style=\"background:#F7F9FA;padding:1px 5px;border-radius:4px;color:#1F2933;\">--chart-series-*<\u002Fcode>.<\u002Fli>\n          <li>Green = positive/win, red = loss; P&amp;L flips color &amp; sign on negative.<\u002Fli>\n          <li>Token symbols/decimals read from chain context — no hard-coded MATIC/USDC.<\u002Fli>\n        <\u002Ful>\n\n        <div style=\"height:1px;background:#E3E7EB;margin:18px 0;\"><\u002Fdiv>\n        <div style=\"font-size:11px;letter-spacing:.06em;text-transform:uppercase;color:#5A6772;font-weight:700;\">Flagged as follow-up (data not in §4)<\u002Fdiv>\n        <p style=\"margin:8px 0 0;color:#5A6772;\">Per-day \"balance\" before the first indexed transfer can't be reconstructed → chart starts at first activity. \"Delta vs last period\" on tiles needs a prior-window aggregate; derivable from the same transfer set but confirm the indexer returns full history, not just the current page of <code style=\"background:#F7F9FA;padding:1px 5px;border-radius:4px;color:#1F2933;\">useMyWagers<\u002Fcode>.<\u002Fp>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fdiv>\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\">\nclass Component extends DCLogic {\n  componentDidMount(){\n    this._animate();\n    this._tick();\n  }\n  componentWillUnmount(){ if(this._iv) clearInterval(this._iv); }\n  _animate(){\n    document.querySelectorAll('[data-cu]').forEach(el=>{\n      const target=parseFloat(el.getAttribute('data-cu'));\n      const dec=parseInt(el.getAttribute('data-cu-dec')||'0');\n      const pre=el.getAttribute('data-cu-pre')||'';\n      const suf=el.getAttribute('data-cu-suf')||'';\n      const sign=el.getAttribute('data-cu-sign')==='1';\n      const dur=1000, start=performance.now();\n      const fmt=v=>{ let s=(sign&&v>0?'+':'')+pre+Math.abs(v).toLocaleString('en-US',{minimumFractionDigits:dec,maximumFractionDigits:dec})+suf; if(v<0) s='-'+s.replace('-',''); return (sign&&v<0?'-':'')+pre+Math.abs(v).toLocaleString('en-US',{minimumFractionDigits:dec,maximumFractionDigits:dec})+suf; };\n      const step=now=>{ let t=Math.min(1,(now-start)/dur); let e=1-Math.pow(1-t,3); el.textContent=fmt(target*e); if(t<1) requestAnimationFrame(step); else el.textContent=fmt(target); };\n      requestAnimationFrame(step);\n    });\n  }\n  _tick(){\n    this._iv=setInterval(()=>{\n      document.querySelectorAll('[data-ago]').forEach(el=>{\n        let cur=parseInt(el.getAttribute('data-ago-cur')||el.getAttribute('data-ago')||'0');\n        cur+=1;\n        let repoll=false;\n        if(cur>=30){ cur=0; repoll=true; }\n        el.setAttribute('data-ago-cur',cur);\n        el.textContent='updated '+cur+'s ago';\n        if(repoll){\n          const dot=el.closest('[data-livegroup]');\n          if(dot){ const d=dot.querySelector('[data-pulsedot]'); if(d){ d.style.animation='none'; void d.offsetWidth; d.style.animation='fwpulse 1.4s ease-in-out infinite'; } }\n        }\n      });\n    },1000);\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
