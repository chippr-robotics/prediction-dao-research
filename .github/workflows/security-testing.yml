name: Security Testing & Analysis

on:
  pull_request:
    branches:
      - main
      - develop
  push:
    branches:
      - main
      - develop
  schedule:
    # Run weekly on Monday at 00:00 UTC
    - cron: '0 0 * * 1'
  workflow_dispatch:
  workflow_call:

permissions:
  contents: read
  security-events: write

jobs:
  hardhat-tests:
    name: Hardhat Unit Tests & Gas Report
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      # Resilient solc fetch + compile (cache the pinned compiler, retry stalled
      # downloads) instead of a bare `npm run compile` that can hang on a stalled
      # binaries.soliditylang.org fetch.
      - name: Compile contracts
        uses: ./.github/actions/setup-hardhat-solc

      - name: Run tests with gas reporting
        env:
          REPORT_GAS: true
        run: npm test 2>&1 | tee test-output.txt

      - name: Summarize test results
        if: always()
        run: |
          echo "### Hardhat Tests" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          PASSING=$(grep -oP '\d+ passing' test-output.txt | head -1 || echo "n/a")
          FAILING=$(grep -oP '\d+ failing' test-output.txt | head -1 || echo "")
          echo "| Metric | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|--------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| Passing | $PASSING |" >> $GITHUB_STEP_SUMMARY
          [ -n "$FAILING" ] && echo "| Failing | $FAILING |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

      - name: Upload gas report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: security-gas-report
          path: gas-report.txt
          retention-days: 30

  coverage-report:
    name: Coverage Analysis
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      # Warm the cached solc compiler up front so `hardhat coverage` below reuses
      # it instead of triggering a hang-prone download mid-run.
      - name: Compile contracts
        uses: ./.github/actions/setup-hardhat-solc

      # Coverage report generation can fail due to environment issues without indicating
      # actual test failures. We allow this to fail gracefully while still uploading
      # whatever coverage data was generated.
      - name: Generate coverage report
        run: npm run test:coverage
        continue-on-error: true

      - name: Summarize coverage
        if: always()
        run: |
          echo "### Coverage" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          if [ -f "coverage/coverage-summary.json" ]; then
            echo '```' >> $GITHUB_STEP_SUMMARY
            node -e "
              const c = require('./coverage/coverage-summary.json').total;
              console.log('Statements: ' + c.statements.pct + '%');
              console.log('Branches:   ' + c.branches.pct + '%');
              console.log('Functions:  ' + c.functions.pct + '%');
              console.log('Lines:      ' + c.lines.pct + '%');
            " >> $GITHUB_STEP_SUMMARY 2>/dev/null || echo "Coverage data not available" >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
          else
            echo "Coverage summary not available (see uploaded artifacts)" >> $GITHUB_STEP_SUMMARY
          fi
          echo "" >> $GITHUB_STEP_SUMMARY

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: security-coverage-report
          path: coverage/
          retention-days: 30

  slither-analysis:
    name: Slither Static Analysis
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      # Warm the cached solc compiler so Slither's crytic-compile step (which
      # shells out to `hardhat compile`) reuses it instead of hanging on a
      # stalled download.
      - name: Compile contracts
        uses: ./.github/actions/setup-hardhat-solc

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Slither
        run: |
          pip install slither-analyzer
          pip install solc-select
          # Retry solc-select's compiler download (a second, GitHub-hosted fetch
          # path distinct from Hardhat's) so a stalled download can't hang the job.
          for attempt in 1 2 3 4 5; do
            if timeout 180 solc-select install 0.8.24; then
              break
            fi
            echo "::warning::solc-select install attempt ${attempt} failed/stalled; retrying" >&2
            sleep $((attempt * 15))
          done
          solc-select use 0.8.24

      - name: Run Slither analysis
        run: |
          slither . --config-file slither.config.json --checklist --markdown-root . > slither-report.md || true

      - name: Upload Slither reports
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: slither-reports
          path: |
            slither-report.json
            slither-report.md
          retention-days: 30

  summary:
    name: Generate Test Summary
    runs-on: ubuntu-latest
    needs: [hardhat-tests, coverage-report, slither-analysis]
    if: always()
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts/

      - name: Generate summary
        run: |
          echo "# Security Testing & Analysis Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          # Job status
          echo "## Job Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Job | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-----|--------|" >> $GITHUB_STEP_SUMMARY

          for JOB_RESULT in \
            "Hardhat Tests:${{ needs.hardhat-tests.result }}" \
            "Coverage:${{ needs.coverage-report.result }}" \
            "Slither:${{ needs.slither-analysis.result }}"; do
            JOB_NAME="${JOB_RESULT%%:*}"
            JOB_STATUS="${JOB_RESULT##*:}"
            case "$JOB_STATUS" in
              success) echo "| $JOB_NAME | ✅ Passed |" >> $GITHUB_STEP_SUMMARY ;;
              failure) echo "| $JOB_NAME | ❌ Failed |" >> $GITHUB_STEP_SUMMARY ;;
              *) echo "| $JOB_NAME | $JOB_STATUS |" >> $GITHUB_STEP_SUMMARY ;;
            esac
          done
          echo "" >> $GITHUB_STEP_SUMMARY

          # Gas Report
          if [ -f "artifacts/security-gas-report/gas-report.txt" ]; then
            echo "## Gas Report" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "<details><summary>Click to expand</summary>" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
            cat artifacts/security-gas-report/gas-report.txt >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
            echo "</details>" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
          fi

          # Coverage
          if [ -f "artifacts/security-coverage-report/coverage-summary.json" ]; then
            echo "## Coverage" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            node -e "
              const c = require('./artifacts/security-coverage-report/coverage-summary.json').total;
              console.log('| Metric | Coverage | Covered / Total |');
              console.log('|--------|----------|-----------------|');
              console.log('| Statements | ' + c.statements.pct + '% | ' + c.statements.covered + ' / ' + c.statements.total + ' |');
              console.log('| Branches | ' + c.branches.pct + '% | ' + c.branches.covered + ' / ' + c.branches.total + ' |');
              console.log('| Functions | ' + c.functions.pct + '% | ' + c.functions.covered + ' / ' + c.functions.total + ' |');
              console.log('| Lines | ' + c.lines.pct + '% | ' + c.lines.covered + ' / ' + c.lines.total + ' |');
            " >> $GITHUB_STEP_SUMMARY 2>/dev/null || true
            echo "" >> $GITHUB_STEP_SUMMARY
          fi

          # Slither
          if [ -f "artifacts/slither-reports/slither-report.md" ]; then
            echo "## Slither Static Analysis" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            FINDING_COUNT=$(grep -c "^-\|^\*" artifacts/slither-reports/slither-report.md 2>/dev/null || echo "0")
            echo "Findings: $FINDING_COUNT" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "<details><summary>Full report</summary>" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            cat artifacts/slither-reports/slither-report.md >> $GITHUB_STEP_SUMMARY || true
            echo "</details>" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
          fi

          echo "---" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Note:** Manticore symbolic execution and Medusa fuzz testing run in the Weekly Torture Test workflow." >> $GITHUB_STEP_SUMMARY
