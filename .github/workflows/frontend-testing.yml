name: Frontend Testing and Accessibility Audits

on:
  pull_request:
    branches:
      - main
      - develop
    paths:
      - 'frontend/**'
  push:
    branches:
      - main
      - develop
    paths:
      - 'frontend/**'
  workflow_dispatch:

permissions:
  contents: read
  issues: write
  pull-requests: write

jobs:
  unit-tests:
    name: Unit and Integration Tests
    runs-on: ubuntu-latest
    
    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: 'frontend/package-lock.json'

      - name: Install dependencies
        run: npm ci

      - name: Run unit tests
        run: npm test -- --run --reporter=verbose 2>&1 | tee test-output.txt
        env:
          NODE_OPTIONS: --max-old-space-size=4096

      - name: Summarize test results
        if: always()
        run: |
          echo "### Frontend Unit Tests" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          TESTS_LINE=$(grep "Tests" test-output.txt | tail -1 || echo "")
          FILES_LINE=$(grep "Test Files" test-output.txt | tail -1 || echo "")
          DURATION_LINE=$(grep "Duration" test-output.txt | tail -1 || echo "")
          if [ -n "$FILES_LINE" ]; then
            echo "| Metric | Value |" >> $GITHUB_STEP_SUMMARY
            echo "|--------|-------|" >> $GITHUB_STEP_SUMMARY
            echo "| $FILES_LINE |" | sed 's/^.*Test Files/| Test Files |/' >> $GITHUB_STEP_SUMMARY 2>/dev/null || true
            echo "| $TESTS_LINE |" | sed 's/^.*Tests/| Tests |/' >> $GITHUB_STEP_SUMMARY 2>/dev/null || true
            echo "| $DURATION_LINE |" | sed 's/^.*Duration/| Duration |/' >> $GITHUB_STEP_SUMMARY 2>/dev/null || true
          fi
          echo "" >> $GITHUB_STEP_SUMMARY

      # Coverage report generation can fail due to environment issues without indicating
      # actual test failures. We allow this to fail gracefully while still uploading
      # whatever coverage data was generated.
      - name: Generate coverage report
        run: npm run test:coverage -- --run
        continue-on-error: true
        env:
          NODE_OPTIONS: --max-old-space-size=4096

      - name: Summarize coverage
        if: always()
        run: |
          echo "### Frontend Coverage" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          if [ -f "coverage/coverage-summary.json" ]; then
            echo '```' >> $GITHUB_STEP_SUMMARY
            node -e "
              const c = require('./coverage/coverage-summary.json').total;
              console.log('Statements: ' + c.statements.pct + '%');
              console.log('Branches:   ' + c.branches.pct + '%');
              console.log('Functions:  ' + c.functions.pct + '%');
              console.log('Lines:      ' + c.lines.pct + '%');
            " >> $GITHUB_STEP_SUMMARY 2>/dev/null || echo "Coverage data not available" >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
          else
            echo "Coverage summary not available" >> $GITHUB_STEP_SUMMARY
          fi
          echo "" >> $GITHUB_STEP_SUMMARY

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: frontend-coverage
          path: frontend/coverage/
          retention-days: 30

  lighthouse-audit:
    name: Lighthouse Accessibility Audit
    runs-on: ubuntu-latest
    needs: unit-tests
    
    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: 'frontend/package-lock.json'

      - name: Install dependencies
        run: npm ci

      - name: Install Lighthouse CI
        run: npm install -g @lhci/cli@0.13.x

      - name: Build frontend
        run: npm run build
        env:
          NODE_ENV: production

      - name: Verify build output
        run: |
          if [ ! -d "dist" ]; then
            echo "Error: dist directory not found after build"
            exit 1
          fi
          if [ ! -f "dist/index.html" ]; then
            echo "Error: dist/index.html not found after build"
            exit 1
          fi
          echo "Build output verified. Contents of dist:"
          ls -la dist/
          echo "Checking index.html:"
          head -20 dist/index.html

      - name: Run Lighthouse CI
        run: lhci autorun
        env:
          LHCI_BUILD_CONTEXT__CURRENT_HASH: ${{ github.sha }}
          LHCI_BUILD_CONTEXT__COMMIT_TIME: ${{ github.event.head_commit.timestamp }}

      - name: Summarize Lighthouse results
        if: always()
        run: |
          echo "### Lighthouse Scores" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          # Parse the latest Lighthouse JSON report
          REPORT=$(find .lighthouseci -name "lhr-*.json" -type f | head -1 2>/dev/null || echo "")
          if [ -n "$REPORT" ] && [ -f "$REPORT" ]; then
            node -e "
              const lhr = require('./$REPORT');
              const cats = lhr.categories || {};
              console.log('| Category | Score |');
              console.log('|----------|-------|');
              for (const [key, cat] of Object.entries(cats)) {
                const score = Math.round((cat.score || 0) * 100);
                const icon = score >= 90 ? '🟢' : score >= 50 ? '🟠' : '🔴';
                console.log('| ' + cat.title + ' | ' + icon + ' ' + score + ' |');
              }
            " >> $GITHUB_STEP_SUMMARY 2>/dev/null || echo "Could not parse Lighthouse report" >> $GITHUB_STEP_SUMMARY
          else
            echo "Lighthouse report not available" >> $GITHUB_STEP_SUMMARY
          fi
          echo "" >> $GITHUB_STEP_SUMMARY

      - name: Upload Lighthouse results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: lighthouse-results
          path: frontend/.lighthouseci/
          retention-days: 30

  axe-audit:
    name: axe Accessibility Audit
    runs-on: ubuntu-latest
    needs: unit-tests
    
    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: 'frontend/package-lock.json'

      - name: Install dependencies
        run: npm ci

      - name: Run axe accessibility tests
        run: npm test -- --run accessibility.test
        continue-on-error: false

      - name: Comment PR with results
        if: github.event_name == 'pull_request' && failure()
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: '⚠️ Accessibility tests failed. Please review the axe audit results and fix any WCAG AA violations.'
            })

  deployment-ready:
    name: Deployment Readiness Check
    runs-on: ubuntu-latest
    needs: [unit-tests, lighthouse-audit, axe-audit]
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop'
    
    steps:
      - name: Check all tests passed
        run: echo "All tests and audits passed. Ready for deployment."

      - name: Deployment summary
        run: |
          echo "### Deployment Readiness" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Check | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Unit tests | ✅ Passed |" >> $GITHUB_STEP_SUMMARY
          echo "| Lighthouse audit | ✅ Completed |" >> $GITHUB_STEP_SUMMARY
          echo "| axe a11y audit | ✅ Passed |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
