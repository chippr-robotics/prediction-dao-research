name: Weekly Torture Test

on:
  schedule:
    # Run weekly on Monday at 00:00 UTC
    - cron: '0 0 * * 1'
  workflow_dispatch:

permissions:
  contents: read
  security-events: write

jobs:
  hardhat-tests:
    name: Hardhat Unit Tests & Gas Report
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Cache Hardhat compilers
        uses: actions/cache@v4
        with:
          path: ~/.cache/hardhat-nodejs/compilers-v2
          key: ${{ runner.os }}-hardhat-solc-0.8.24
          restore-keys: |
            ${{ runner.os }}-hardhat-solc-

      - name: Compile contracts
        run: npm run compile:ci

      - name: Run tests with gas reporting
        env:
          REPORT_GAS: true
        run: npm test 2>&1 | tee test-output.txt

      - name: Summarize test results
        if: always()
        run: |
          echo "### Hardhat Unit Tests" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          PASSING=$(grep -oP '\d+ passing' test-output.txt | head -1 || echo "n/a")
          PENDING=$(grep -oP '\d+ pending' test-output.txt | head -1 || echo "")
          FAILING=$(grep -oP '\d+ failing' test-output.txt | head -1 || echo "")
          echo "| Metric | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|--------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| Passing | $PASSING |" >> $GITHUB_STEP_SUMMARY
          [ -n "$PENDING" ] && echo "| Pending | $PENDING |" >> $GITHUB_STEP_SUMMARY
          [ -n "$FAILING" ] && echo "| Failing | $FAILING |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

      - name: Upload gas report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: gas-report
          path: gas-report.txt
          retention-days: 90

  coverage-report:
    name: Coverage Analysis
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Cache Hardhat compilers
        uses: actions/cache@v4
        with:
          path: ~/.cache/hardhat-nodejs/compilers-v2
          key: ${{ runner.os }}-hardhat-solc-0.8.24
          restore-keys: |
            ${{ runner.os }}-hardhat-solc-

      - name: Generate coverage report
        run: npm run test:coverage

      - name: Summarize coverage
        if: always()
        run: |
          echo "### Contract Coverage" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          if [ -f "coverage/coverage-summary.json" ]; then
            echo '```' >> $GITHUB_STEP_SUMMARY
            node -e "
              const c = require('./coverage/coverage-summary.json').total;
              console.log('Statements: ' + c.statements.pct + '% (' + c.statements.covered + '/' + c.statements.total + ')');
              console.log('Branches:   ' + c.branches.pct + '% (' + c.branches.covered + '/' + c.branches.total + ')');
              console.log('Functions:  ' + c.functions.pct + '% (' + c.functions.covered + '/' + c.functions.total + ')');
              console.log('Lines:      ' + c.lines.pct + '% (' + c.lines.covered + '/' + c.lines.total + ')');
            " >> $GITHUB_STEP_SUMMARY 2>/dev/null || echo "Coverage data not available" >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
          elif [ -d "coverage" ]; then
            echo "Coverage artifacts generated (see uploaded report)" >> $GITHUB_STEP_SUMMARY
          else
            echo "⚠️ Coverage generation failed" >> $GITHUB_STEP_SUMMARY
          fi
          echo "" >> $GITHUB_STEP_SUMMARY

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: coverage/
          retention-days: 90

  slither-analysis:
    name: Slither Static Analysis
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Cache Hardhat compilers
        uses: actions/cache@v4
        with:
          path: ~/.cache/hardhat-nodejs/compilers-v2
          key: ${{ runner.os }}-hardhat-solc-0.8.24
          restore-keys: |
            ${{ runner.os }}-hardhat-solc-

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Slither
        run: |
          pip install slither-analyzer
          pip install solc-select
          solc-select install 0.8.24
          solc-select use 0.8.24

      - name: Run Slither analysis
        run: |
          # Slither exits non-zero when it reports findings; that is informational
          # for this weekly job (the report is uploaded as an artifact), so don't
          # let a finding fail the job — matches security-testing.yml behavior.
          slither . --config-file slither.config.json --checklist --markdown-root . > slither-report.md || true

      - name: Upload Slither reports
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: slither-reports
          path: |
            slither-report.json
            slither-report.md
          retention-days: 90

  manticore-analysis:
    name: Manticore Symbolic Execution
    runs-on: ubuntu-latest
    # Manticore is a best-effort weekly tool with a fragile install (protobuf /
    # wasm / Python compat). Its analysis steps are already continue-on-error;
    # mark the whole job non-blocking so an install failure doesn't fail the
    # weekly torture test. Results are still uploaded as artifacts when it runs.
    continue-on-error: true
    timeout-minutes: 180
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Cache Hardhat compilers
        uses: actions/cache@v4
        with:
          path: ~/.cache/hardhat-nodejs/compilers-v2
          key: ${{ runner.os }}-hardhat-solc-0.8.24
          restore-keys: |
            ${{ runner.os }}-hardhat-solc-

      - name: Compile contracts
        run: npm run compile:ci

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential python3-dev

      - name: Install Manticore
        run: |
          python -m pip install --upgrade pip
          pip install 'protobuf<=3.20.3'
          pip install manticore[native]
          pip install solc-select
          solc-select install 0.8.24
          solc-select use 0.8.24

      - name: Patch wasm package for Python 3.10+ compatibility
        run: python scripts/patch-wasm-types.py

      - name: Run Manticore on WagerRegistry
        run: |
          echo "Running Manticore on WagerRegistry..."
          timeout 600 python scripts/run-manticore.py contracts/wagers/WagerRegistry.sol \
            --contract WagerRegistry --timeout 600 || echo "Manticore analysis completed with warnings/errors"
        continue-on-error: true

      - name: Run Manticore on MembershipManager
        run: |
          echo "Running Manticore on MembershipManager..."
          timeout 600 python scripts/run-manticore.py contracts/access/MembershipManager.sol \
            --contract MembershipManager --timeout 600 || echo "Manticore analysis completed with warnings/errors"
        continue-on-error: true

      - name: Run Manticore on KeyRegistry
        run: |
          echo "Running Manticore on KeyRegistry..."
          timeout 600 python scripts/run-manticore.py contracts/privacy/KeyRegistry.sol \
            --contract KeyRegistry --timeout 600 || echo "Manticore analysis completed with warnings/errors"
        continue-on-error: true

      - name: Run Manticore on PolymarketOracleAdapter
        run: |
          echo "Running Manticore on PolymarketOracleAdapter..."
          timeout 600 python scripts/run-manticore.py contracts/oracles/PolymarketOracleAdapter.sol \
            --contract PolymarketOracleAdapter --timeout 600 || echo "Manticore analysis completed with warnings/errors"
        continue-on-error: true

      - name: Run Manticore on ChainlinkDataFeedOracleAdapter
        run: |
          echo "Running Manticore on ChainlinkDataFeedOracleAdapter..."
          timeout 600 python scripts/run-manticore.py contracts/oracles/ChainlinkDataFeedOracleAdapter.sol \
            --contract ChainlinkDataFeedOracleAdapter --timeout 600 || echo "Manticore analysis completed with warnings/errors"
        continue-on-error: true

      - name: Run Manticore on ChainlinkFunctionsOracleAdapter
        run: |
          echo "Running Manticore on ChainlinkFunctionsOracleAdapter..."
          timeout 600 python scripts/run-manticore.py contracts/oracles/ChainlinkFunctionsOracleAdapter.sol \
            --contract ChainlinkFunctionsOracleAdapter --timeout 600 || echo "Manticore analysis completed with warnings/errors"
        continue-on-error: true

      - name: Run Manticore on UMAOptimisticOracleV3Adapter
        run: |
          echo "Running Manticore on UMAOptimisticOracleV3Adapter..."
          timeout 600 python scripts/run-manticore.py contracts/oracles/UMAOptimisticOracleV3Adapter.sol \
            --contract UMAOptimisticOracleV3Adapter --timeout 600 || echo "Manticore analysis completed with warnings/errors"
        continue-on-error: true

      - name: Collect Manticore results
        if: always()
        run: |
          mkdir -p manticore-results
          find . -type d -name "mcore_*" -exec cp -r {} manticore-results/ \; || true

      - name: Upload Manticore results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: manticore-results
          path: manticore-results/
          retention-days: 90

  medusa-fuzzing:
    name: Medusa Fuzz Testing
    runs-on: ubuntu-latest
    timeout-minutes: 120
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Cache Hardhat compilers
        uses: actions/cache@v4
        with:
          path: ~/.cache/hardhat-nodejs/compilers-v2
          key: ${{ runner.os }}-hardhat-solc-0.8.24
          restore-keys: |
            ${{ runner.os }}-hardhat-solc-

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.21'

      - name: Install Medusa
        run: |
          go install github.com/crytic/medusa@latest
          echo "$HOME/go/bin" >> $GITHUB_PATH

      - name: Install crytic-compile
        run: |
          pip install crytic-compile

      - name: Compile contracts
        run: npm run compile:ci

      - name: Run Medusa fuzzing (extended)
        run: |
          export PATH=$PATH:$HOME/go/bin
          medusa fuzz --timeout 3600 2>&1 | tee medusa-output.txt
        continue-on-error: true

      - name: Summarize Medusa results
        if: always()
        run: |
          echo "### Medusa Fuzz Testing" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          if [ -f "medusa-output.txt" ]; then
            PASSED=$(grep -c "PASSED" medusa-output.txt 2>/dev/null || echo "0")
            FAILED=$(grep -c "FAILED" medusa-output.txt 2>/dev/null || echo "0")
            echo "| Metric | Value |" >> $GITHUB_STEP_SUMMARY
            echo "|--------|-------|" >> $GITHUB_STEP_SUMMARY
            echo "| Properties passed | $PASSED |" >> $GITHUB_STEP_SUMMARY
            echo "| Properties failed | $FAILED |" >> $GITHUB_STEP_SUMMARY
            echo "| Target contracts | WagerRegistryFuzzTest, MembershipManagerFuzzTest, KeyRegistryFuzzTest |" >> $GITHUB_STEP_SUMMARY
            echo "| Timeout | 3600s |" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY

            # Show any failures in detail
            if [ "$FAILED" -gt "0" ]; then
              echo "<details><summary>Failed properties</summary>" >> $GITHUB_STEP_SUMMARY
              echo "" >> $GITHUB_STEP_SUMMARY
              echo '```' >> $GITHUB_STEP_SUMMARY
              grep -A5 "FAILED" medusa-output.txt >> $GITHUB_STEP_SUMMARY 2>/dev/null || true
              echo '```' >> $GITHUB_STEP_SUMMARY
              echo "</details>" >> $GITHUB_STEP_SUMMARY
              echo "" >> $GITHUB_STEP_SUMMARY
            fi
          else
            echo "⚠️ Medusa output not available" >> $GITHUB_STEP_SUMMARY
          fi

      - name: Collect Medusa results
        if: always()
        run: |
          mkdir -p medusa-results
          cp -r medusa-corpus medusa-results/ || true
          cp medusa.json medusa-results/ || true
          cp medusa-output.txt medusa-results/ || true
          find . -name "medusa-output" -exec cp -r {} medusa-results/ \; || true

      - name: Upload Medusa results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: medusa-results
          path: medusa-results/
          retention-days: 90

  cypress-e2e:
    name: Cypress E2E Tests
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install root dependencies
        run: npm ci

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Start Hardhat node
        run: |
          npm run node > /tmp/hardhat-node.log 2>&1 &
          echo "HARDHAT_PID=$!" >> $GITHUB_ENV
        
      - name: Wait for Hardhat to start
        run: |
          echo "Waiting for Hardhat node to be ready..."
          sleep 15
          # Check if Hardhat node is responding
          curl -X POST -H "Content-Type: application/json" \
            --data '{"jsonrpc":"2.0","method":"eth_blockNumber","params":[],"id":1}' \
            http://localhost:8545 || echo "Hardhat node may not be ready yet"

      - name: Deploy contracts to local network
        run: |
          echo "Deploying contracts to local Hardhat network..."
          npm run deploy:local
          echo "Contract deployment completed"
        continue-on-error: false

      - name: Run Cypress E2E tests (full suite)
        working-directory: frontend
        run: npx start-server-and-test dev http://localhost:5173 'cypress run --spec "cypress/e2e/**/*.cy.js" --reporter json --reporter-options "output=cypress-results.json"' 2>&1 | tee cypress-output.txt
        continue-on-error: true

      - name: Summarize Cypress results
        if: always()
        working-directory: frontend
        run: |
          echo "### Cypress E2E Tests (Full Suite)" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          if [ -f "cypress-results.json" ]; then
            node -e "
              const r = require('./cypress-results.json');
              const stats = r.stats || {};
              console.log('| Metric | Value |');
              console.log('|--------|-------|');
              console.log('| Passing | ' + (stats.passes || 0) + ' |');
              console.log('| Failing | ' + (stats.failures || 0) + ' |');
              console.log('| Pending | ' + (stats.pending || 0) + ' |');
              console.log('| Duration | ' + ((stats.duration || 0) / 1000).toFixed(1) + 's |');
              console.log('| Suites | ' + (stats.suites || 0) + ' |');
            " >> $GITHUB_STEP_SUMMARY 2>/dev/null
          else
            # Fall back to text parsing
            SPECS=$(grep -c "Running:" cypress-output.txt 2>/dev/null || echo "n/a")
            PASSING=$(grep -oP '\d+ passing' cypress-output.txt | tail -1 || echo "")
            FAILING=$(grep -oP '\d+ failing' cypress-output.txt | tail -1 || echo "")
            echo "| Metric | Value |" >> $GITHUB_STEP_SUMMARY
            echo "|--------|-------|" >> $GITHUB_STEP_SUMMARY
            echo "| Specs run | $SPECS |" >> $GITHUB_STEP_SUMMARY
            [ -n "$PASSING" ] && echo "| Passing | $PASSING |" >> $GITHUB_STEP_SUMMARY
            [ -n "$FAILING" ] && echo "| Failing | $FAILING |" >> $GITHUB_STEP_SUMMARY
          fi
          echo "" >> $GITHUB_STEP_SUMMARY

      - name: Check Cypress exit code
        if: always()
        working-directory: frontend
        run: |
          if grep -q "failing" cypress-output.txt 2>/dev/null; then
            exit 1
          fi

      - name: Upload Cypress screenshots
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: cypress-screenshots
          path: frontend/cypress/screenshots
          retention-days: 90

      - name: Upload Cypress videos
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: cypress-videos
          path: frontend/cypress/videos
          retention-days: 90

      - name: Upload Cypress JSON results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: cypress-e2e-results
          path: frontend/cypress-results.json
          retention-days: 90

  summary:
    name: Generate Test Summary
    runs-on: ubuntu-latest
    needs: [hardhat-tests, coverage-report, slither-analysis, manticore-analysis, medusa-fuzzing, cypress-e2e]
    if: always()

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts/

      - name: Generate summary
        run: |
          echo "# Weekly Torture Test Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          # ---- Job Status Overview ----
          echo "## Job Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Job | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-----|--------|" >> $GITHUB_STEP_SUMMARY

          for JOB in hardhat-tests coverage-report slither-analysis manticore-analysis medusa-fuzzing cypress-e2e; do
            RESULT="${{ needs.hardhat-tests.result }}"
            case "$JOB" in
              coverage-report) RESULT="${{ needs.coverage-report.result }}" ;;
              slither-analysis) RESULT="${{ needs.slither-analysis.result }}" ;;
              manticore-analysis) RESULT="${{ needs.manticore-analysis.result }}" ;;
              medusa-fuzzing) RESULT="${{ needs.medusa-fuzzing.result }}" ;;
              cypress-e2e) RESULT="${{ needs.cypress-e2e.result }}" ;;
            esac

            case "$RESULT" in
              success) echo "| $JOB | ✅ Passed |" >> $GITHUB_STEP_SUMMARY ;;
              failure) echo "| $JOB | ❌ Failed |" >> $GITHUB_STEP_SUMMARY ;;
              skipped) echo "| $JOB | ⏭️ Skipped |" >> $GITHUB_STEP_SUMMARY ;;
              cancelled) echo "| $JOB | 🚫 Cancelled |" >> $GITHUB_STEP_SUMMARY ;;
              *) echo "| $JOB | ❓ $RESULT |" >> $GITHUB_STEP_SUMMARY ;;
            esac
          done
          echo "" >> $GITHUB_STEP_SUMMARY

          # ---- Gas Report ----
          echo "## Gas Report" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          if [ -f "artifacts/gas-report/gas-report.txt" ]; then
            echo "<details><summary>Click to expand gas report</summary>" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
            cat artifacts/gas-report/gas-report.txt >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
            echo "</details>" >> $GITHUB_STEP_SUMMARY
          else
            echo "Gas report not available" >> $GITHUB_STEP_SUMMARY
          fi
          echo "" >> $GITHUB_STEP_SUMMARY

          # ---- Coverage ----
          echo "## Coverage" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          if [ -f "artifacts/coverage-report/coverage-summary.json" ]; then
            node -e "
              const c = require('./artifacts/coverage-report/coverage-summary.json').total;
              console.log('| Metric | Coverage | Covered / Total |');
              console.log('|--------|----------|-----------------|');
              console.log('| Statements | ' + c.statements.pct + '% | ' + c.statements.covered + ' / ' + c.statements.total + ' |');
              console.log('| Branches | ' + c.branches.pct + '% | ' + c.branches.covered + ' / ' + c.branches.total + ' |');
              console.log('| Functions | ' + c.functions.pct + '% | ' + c.functions.covered + ' / ' + c.functions.total + ' |');
              console.log('| Lines | ' + c.lines.pct + '% | ' + c.lines.covered + ' / ' + c.lines.total + ' |');
            " >> $GITHUB_STEP_SUMMARY 2>/dev/null || echo "Could not parse coverage data" >> $GITHUB_STEP_SUMMARY
          else
            echo "Coverage summary not available (see uploaded artifacts)" >> $GITHUB_STEP_SUMMARY
          fi
          echo "" >> $GITHUB_STEP_SUMMARY

          # ---- Slither ----
          echo "## Slither Static Analysis" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          if [ -f "artifacts/slither-reports/slither-report.md" ]; then
            FINDING_COUNT=$(grep -c "^-\|^\*" artifacts/slither-reports/slither-report.md 2>/dev/null || echo "0")
            echo "Findings: $FINDING_COUNT" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "<details><summary>Full Slither report</summary>" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            cat artifacts/slither-reports/slither-report.md >> $GITHUB_STEP_SUMMARY || true
            echo "</details>" >> $GITHUB_STEP_SUMMARY
          else
            echo "Slither report not available" >> $GITHUB_STEP_SUMMARY
          fi
          echo "" >> $GITHUB_STEP_SUMMARY

          # ---- Manticore ----
          echo "## Manticore Symbolic Execution" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Contracts analyzed: WagerRegistry, MembershipManager, KeyRegistry, PolymarketOracleAdapter, ChainlinkDataFeedOracleAdapter, ChainlinkFunctionsOracleAdapter, UMAOptimisticOracleV3Adapter" >> $GITHUB_STEP_SUMMARY
          if [ -d "artifacts/manticore-results" ]; then
            DIRS=$(find artifacts/manticore-results -type d -name "mcore_*" 2>/dev/null | wc -l || echo "0")
            echo "Result directories: $DIRS" >> $GITHUB_STEP_SUMMARY
          else
            echo "Results: see uploaded artifacts" >> $GITHUB_STEP_SUMMARY
          fi
          echo "" >> $GITHUB_STEP_SUMMARY

          # ---- Artifacts Index ----
          echo "## Artifacts" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Artifact | Retention |" >> $GITHUB_STEP_SUMMARY
          echo "|----------|-----------|" >> $GITHUB_STEP_SUMMARY
          echo "| gas-report | 90 days |" >> $GITHUB_STEP_SUMMARY
          echo "| coverage-report | 90 days |" >> $GITHUB_STEP_SUMMARY
          echo "| slither-reports | 90 days |" >> $GITHUB_STEP_SUMMARY
          echo "| manticore-results | 90 days |" >> $GITHUB_STEP_SUMMARY
          echo "| medusa-results | 90 days |" >> $GITHUB_STEP_SUMMARY
          echo "| cypress-e2e-results | 90 days |" >> $GITHUB_STEP_SUMMARY
          echo "| cypress-videos | 90 days |" >> $GITHUB_STEP_SUMMARY
          echo "| cypress-screenshots (on failure) | 90 days |" >> $GITHUB_STEP_SUMMARY
