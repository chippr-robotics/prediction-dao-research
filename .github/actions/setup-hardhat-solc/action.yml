name: Setup Hardhat solc compiler
description: >
  Cache and resiliently pre-fetch the pinned solc compiler so a stalled
  binaries.soliditylang.org download cannot hang CI. Warms Hardhat's compiler
  cache, which is also reused by `hardhat coverage` and by
  Slither/crytic-compile (which shells out to `hardhat compile`).

inputs:
  solc-version:
    description: Solidity compiler version to warm (must match hardhat.config.js).
    required: false
    default: '0.8.24'
  attempts:
    description: Max compile attempts before failing loudly.
    required: false
    default: '5'
  timeout-seconds:
    description: Per-attempt timeout; a stalled download is killed and retried.
    required: false
    default: '240'

runs:
  using: composite
  steps:
    # Persist the downloaded solc binary across runs and across jobs. Once any
    # run fetches solc successfully, later runs restore it and skip the network
    # fetch entirely. Keyed on the pinned version so a version bump re-fetches.
    - name: Restore Hardhat solc compiler cache
      uses: actions/cache@v4
      with:
        path: ~/.cache/hardhat-nodejs
        key: hardhat-solc-${{ runner.os }}-${{ inputs.solc-version }}
        restore-keys: |
          hardhat-solc-${{ runner.os }}-

    # Warm the compiler with bounded retries. `timeout` converts Hardhat's
    # occasional hung solc download (stalls with no error until the runner is
    # reclaimed ~17 min later) into a killed attempt that we retry with backoff.
    # Hardhat re-validates the compiler checksum, so a truncated partial download
    # from a killed attempt is re-fetched rather than reused.
    - name: Compile contracts (cached solc, retry + timeout)
      shell: bash
      run: |
        set -uo pipefail
        attempts='${{ inputs.attempts }}'
        per_timeout='${{ inputs.timeout-seconds }}'
        for attempt in $(seq 1 "$attempts"); do
          echo "::group::Compile attempt ${attempt}/${attempts} (timeout ${per_timeout}s)"
          if timeout "${per_timeout}" npm run compile; then
            echo "::endgroup::"
            echo "Contracts compiled; solc ${{ inputs.solc-version }} cache is warm (attempt ${attempt})."
            exit 0
          fi
          code=$?
          echo "::endgroup::"
          if [ "$code" -eq 124 ]; then
            echo "::warning::compile attempt ${attempt} timed out after ${per_timeout}s (likely a stalled solc download); retrying" >&2
          else
            echo "::warning::compile attempt ${attempt} failed (exit ${code}); retrying" >&2
          fi
          sleep $((attempt * 15))
        done
        echo "::error::npm run compile did not succeed after ${attempts} attempts (solc download or compilation failure)" >&2
        exit 1
