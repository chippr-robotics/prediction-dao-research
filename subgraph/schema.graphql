"""
Subgraph schema for the v2 WagerRegistry contract (spec 017).

Indexes peer-to-peer wagers and, critically, one immutable WagerTransfer row per
value-moving event carrying the transaction hash. The frontend tax/activity report
(spec 016) enumerates and builds line items from WagerTransfer and reads only one
transaction receipt per transfer (for the gas fee) — no eth_getLogs scans.

The "my wagers" view (SubgraphSource) and site stats (useSiteStats) query the Wager
entity directly with where/orderBy on createdAt / status / resolutionType.
"""

enum TransferDirection {
  "value moved party -> escrow (a stake going in)"
  deposit
  "value moved escrow -> winner"
  payout
  "value moved escrow -> party (stake returned)"
  refund
}

enum WagerStatus {
  "created, awaiting opponent acceptance"
  open
  "opponent accepted; stakes escrowed"
  active
  "a draw has been proposed (still active until resolved)"
  draw_proposed
  "resolved to a winner"
  resolved
  "settled as a draw; stakes returned"
  drawn
  "refunded to both parties"
  refunded
  "cancelled before acceptance; creator refunded"
  cancelled
  "opponent declined an open wager"
  declined
}

type Wager @entity(immutable: false) {
  "on-chain wager id"
  id: ID!

  creator: Bytes!
  opponent: Bytes!
  token: Bytes!

  "stakes in token base units, recorded at creation so refund/accept transfers can derive amounts without contract reads"
  creatorStake: BigInt!
  opponentStake: BigInt!

  "v2 ResolutionType enum index"
  resolutionType: Int!
  "off-chain metadata pointer (may be empty)"
  metadataUri: String
  "integrity hash of the metadata"
  metadataHash: Bytes

  status: WagerStatus!
  winner: Bytes

  "address that proposed the open draw while status == draw_proposed; cleared on revoke. Lets the notifier surface the proposer (and the counterparty 'respond to draw' action) without an eth_getLogs scan."
  drawProposer: Bytes

  createdAt: BigInt!
  resolvedAt: BigInt

  "reverse relation — every value movement for this wager"
  transfers: [WagerTransfer!]! @derivedFrom(field: "wager")
}

type WagerTransfer @entity(immutable: true) {
  "txHash-logIndex (unique even when several transfers share one transaction)"
  id: ID!
  wager: Wager!
  "the user whose value moved"
  party: Bytes!
  direction: TransferDirection!
  token: Bytes!
  "base units"
  amount: BigInt!
  "party (deposit) or escrow registry (payout/refund)"
  from: Bytes!
  "escrow registry (deposit) or party (payout/refund)"
  to: Bytes!
  "event.transaction.hash — the key addition that removes the client log scan"
  txHash: Bytes!
  blockNumber: BigInt!
  "event.block.timestamp (unix seconds)"
  timestamp: BigInt!
}

"Lifecycle of a membership voucher NFT (spec 026)."
enum VoucherStatus {
  held
  redeemed
  burned
}

"A transferable membership voucher NFT and its lifecycle (spec 026). Indexed for secondary-market and redemption visibility; on-chain and public by nature."
type Voucher @entity(immutable: false) {
  "tokenId (decimal string)"
  id: ID!
  tokenId: BigInt!
  "current holder; updated on every ERC-721 Transfer"
  owner: Bytes!
  "membership role the voucher claims"
  role: Bytes!
  "tier enum index (1=Bronze .. 4=Platinum), snapshotted at mint"
  tier: Int!
  "membership duration granted on redemption, snapshotted at mint"
  durationDays: Int!
  status: VoucherStatus!
  minter: Bytes!
  mintedAt: BigInt!
  mintTxHash: Bytes!
  "address that redeemed the voucher (received the membership) — may differ from the minter (fresh-wallet redeem)"
  redeemedBy: Bytes
  redeemedAt: BigInt
  redeemTxHash: Bytes
}

"The oracle adapters wired into WagerRegistry v2 that can settle a wager (issue #751)."
enum OracleAdapterType {
  chainlinkDataFeed
  chainlinkFunctions
  uma
}

"""
An outcome condition pre-registered with an oracle adapter (issue #751). Indexed
from each adapter's ConditionRegistered / ConditionResolved events so the
create-wager flow can list available conditions without an eth_getLogs scan.
On-chain and public by nature; the mappings make no contract calls.
"""
type OracleCondition @entity(immutable: false) {
  "<adapterType>-<conditionId> (a conditionId could in principle be reused across adapters)"
  id: ID!
  "the oracle adapter that holds this condition"
  adapter: OracleAdapterType!
  "adapter contract address"
  adapterAddress: Bytes!
  "the on-chain condition id (bytes32)"
  conditionId: Bytes!
  "human description: empty for Chainlink (not stored on-chain), the UMA claim for UMA"
  description: String!
  "expected resolution time (unix seconds); 0 when not tracked on-chain"
  expectedResolutionTime: BigInt!
  registeredAt: BigInt!
  registeredTxHash: Bytes!
  "true once a ConditionResolved event has been seen"
  resolved: Boolean!
  "settled outcome (null until resolved)"
  outcome: Boolean
  "confidence (basis points) reported at resolution (null until resolved)"
  confidence: BigInt
  resolvedAt: BigInt
  "markets linked to this condition via linkMarket"
  links: [OracleMarketLink!]! @derivedFrom(field: "condition")
}

"A link between a market id and an oracle condition (issue #751), one per MarketLinked event."
type OracleMarketLink @entity(immutable: true) {
  "txHash-logIndex (unique even when several links share one transaction)"
  id: ID!
  condition: OracleCondition!
  "the market id passed to linkMarket (the adapter's friendMarketId param)"
  marketId: BigInt!
  conditionId: Bytes!
  adapter: OracleAdapterType!
  linkedAt: BigInt!
  linkedTxHash: Bytes!
}

"""
A token created through the spec-028 TokenFactory (issue #761). Indexed from the
factory's TokenCreated event so discovery and an issuer's admin list work without
an eth_getLogs scan. On subgraph-less networks (Mordor/ETC) the frontend falls
back to on-chain factory-registry reads. Network-scoped by deployment; the
factory's clone templates are immutable. The permissioned ERC-3643 standard (3)
is reserved (deferred) — only standards 0/1/2 are issued today.
"""
type Token @entity(immutable: false) {
  "deployed token address (lowercased hex)"
  id: ID!
  "registry id allocated by the factory (decimal string mirror of `registryId`)"
  registryId: BigInt!
  "TokenStandard enum index: 0=OPEN_ERC20, 1=OPEN_ERC721, 2=RESTRICTED_ERC1404, 3=PERMISSIONED_ERC3643"
  standard: Int!
  "deployed token contract address"
  tokenAddress: Bytes!
  "issuer / initial owner"
  issuer: Bytes!
  name: String!
  symbol: String!
  createdAt: BigInt!
  createdTxHash: Bytes!
}

"""
Per-token fungible holder balance (spec 028 expansion, US10). Indexed from each issued fungible token's Transfer
events via the TokenInstance data-source template (spawned on TokenCreated). Powers the cap table. ERC-721
holders are out of scope here (different Transfer encoding). On subgraph-less networks the frontend disables the
cap table truthfully.
"""
type Holder @entity(immutable: false) {
  "<tokenAddress>-<holderAddress>"
  id: ID!
  "issued token contract"
  token: Bytes!
  "holder address"
  account: Bytes!
  "current balance (raw, token decimals)"
  balance: BigInt!
  firstHeldAt: BigInt!
  lastUpdatedAt: BigInt!
}

"""
Per-token on-chain activity (spec 028 expansion, US12). Indexed from each fungible token's Transfer + admin
events. type ∈ mint | burn | transfer | pause | unpause | freeze | unfreeze | role_granted | role_revoked.
"""
type TokenActivity @entity(immutable: true) {
  "<txHash>-<logIndex>"
  id: ID!
  token: Bytes!
  type: String!
  actor: Bytes!
  from: Bytes
  to: Bytes
  amount: BigInt
  detail: String!
  timestamp: BigInt!
  txHash: Bytes!
}
