"""
Subgraph schema for the v2 WagerRegistry contract (spec 017).

Indexes peer-to-peer wagers and, critically, one immutable WagerTransfer row per
value-moving event carrying the transaction hash. The frontend tax/activity report
(spec 016) enumerates and builds line items from WagerTransfer and reads only one
transaction receipt per transfer (for the gas fee) — no eth_getLogs scans.

The "my wagers" view (SubgraphSource) and site stats (useSiteStats) query the Wager
entity directly with where/orderBy on createdAt / status / resolutionType.
"""

enum TransferDirection {
  "value moved party -> escrow (a stake going in)"
  deposit
  "value moved escrow -> winner"
  payout
  "value moved escrow -> party (stake returned)"
  refund
}

enum WagerStatus {
  "created, awaiting opponent acceptance"
  open
  "opponent accepted; stakes escrowed"
  active
  "a draw has been proposed (still active until resolved)"
  draw_proposed
  "resolved to a winner"
  resolved
  "settled as a draw; stakes returned"
  drawn
  "refunded to both parties"
  refunded
  "cancelled before acceptance; creator refunded"
  cancelled
  "opponent declined an open wager"
  declined
}

type Wager @entity(immutable: false) {
  "on-chain wager id"
  id: ID!

  creator: Bytes!
  opponent: Bytes!
  token: Bytes!

  "stakes in token base units, recorded at creation so refund/accept transfers can derive amounts without contract reads"
  creatorStake: BigInt!
  opponentStake: BigInt!

  "v2 ResolutionType enum index"
  resolutionType: Int!
  "off-chain metadata pointer (may be empty)"
  metadataUri: String
  "integrity hash of the metadata"
  metadataHash: Bytes

  status: WagerStatus!
  winner: Bytes

  "address that proposed the open draw while status == draw_proposed; cleared on revoke. Lets the notifier surface the proposer (and the counterparty 'respond to draw' action) without an eth_getLogs scan."
  drawProposer: Bytes

  createdAt: BigInt!
  resolvedAt: BigInt

  "reverse relation — every value movement for this wager"
  transfers: [WagerTransfer!]! @derivedFrom(field: "wager")
}

type WagerTransfer @entity(immutable: true) {
  "txHash-logIndex (unique even when several transfers share one transaction)"
  id: ID!
  wager: Wager!
  "the user whose value moved"
  party: Bytes!
  direction: TransferDirection!
  token: Bytes!
  "base units"
  amount: BigInt!
  "party (deposit) or escrow registry (payout/refund)"
  from: Bytes!
  "escrow registry (deposit) or party (payout/refund)"
  to: Bytes!
  "event.transaction.hash — the key addition that removes the client log scan"
  txHash: Bytes!
  blockNumber: BigInt!
  "event.block.timestamp (unix seconds)"
  timestamp: BigInt!
}

"Lifecycle of a membership voucher NFT (spec 026)."
enum VoucherStatus {
  held
  redeemed
  burned
}

"A transferable membership voucher NFT and its lifecycle (spec 026). Indexed for secondary-market and redemption visibility; on-chain and public by nature."
type Voucher @entity(immutable: false) {
  "tokenId (decimal string)"
  id: ID!
  tokenId: BigInt!
  "current holder; updated on every ERC-721 Transfer"
  owner: Bytes!
  "membership role the voucher claims"
  role: Bytes!
  "tier enum index (1=Bronze .. 4=Platinum), snapshotted at mint"
  tier: Int!
  "membership duration granted on redemption, snapshotted at mint"
  durationDays: Int!
  status: VoucherStatus!
  minter: Bytes!
  mintedAt: BigInt!
  mintTxHash: Bytes!
  "address that redeemed the voucher (received the membership) — may differ from the minter (fresh-wallet redeem)"
  redeemedBy: Bytes
  redeemedAt: BigInt
  redeemTxHash: Bytes
}

"The oracle adapters wired into WagerRegistry v2 that can settle a wager (issue #751)."
enum OracleAdapterType {
  chainlinkDataFeed
  chainlinkFunctions
  uma
}

"""
An outcome condition pre-registered with an oracle adapter (issue #751). Indexed
from each adapter's ConditionRegistered / ConditionResolved events so the
create-wager flow can list available conditions without an eth_getLogs scan.
On-chain and public by nature; the mappings make no contract calls.
"""
type OracleCondition @entity(immutable: false) {
  "<adapterType>-<conditionId> (a conditionId could in principle be reused across adapters)"
  id: ID!
  "the oracle adapter that holds this condition"
  adapter: OracleAdapterType!
  "adapter contract address"
  adapterAddress: Bytes!
  "the on-chain condition id (bytes32)"
  conditionId: Bytes!
  "human description: empty for Chainlink (not stored on-chain), the UMA claim for UMA"
  description: String!
  "expected resolution time (unix seconds); 0 when not tracked on-chain"
  expectedResolutionTime: BigInt!
  registeredAt: BigInt!
  registeredTxHash: Bytes!
  "true once a ConditionResolved event has been seen"
  resolved: Boolean!
  "settled outcome (null until resolved)"
  outcome: Boolean
  "confidence (basis points) reported at resolution (null until resolved)"
  confidence: BigInt
  resolvedAt: BigInt
  "markets linked to this condition via linkMarket"
  links: [OracleMarketLink!]! @derivedFrom(field: "condition")
}

"A link between a market id and an oracle condition (issue #751), one per MarketLinked event."
type OracleMarketLink @entity(immutable: true) {
  "txHash-logIndex (unique even when several links share one transaction)"
  id: ID!
  condition: OracleCondition!
  "the market id passed to linkMarket (the adapter's friendMarketId param)"
  marketId: BigInt!
  conditionId: Bytes!
  adapter: OracleAdapterType!
  linkedAt: BigInt!
  linkedTxHash: Bytes!
}

"""
A token created through the spec-028 TokenFactory (issue #761). Indexed from the
factory's TokenCreated event so discovery and an issuer's admin list work without
an eth_getLogs scan. On subgraph-less networks (Mordor/ETC) the frontend falls
back to on-chain factory-registry reads. Network-scoped by deployment; the
factory's clone templates are immutable. The permissioned ERC-3643 standard (3)
is reserved (deferred) — only standards 0/1/2 are issued today.
"""
type Token @entity(immutable: false) {
  "deployed token address (lowercased hex)"
  id: ID!
  "registry id allocated by the factory (decimal string mirror of `registryId`)"
  registryId: BigInt!
  "TokenStandard enum index: 0=OPEN_ERC20, 1=OPEN_ERC721, 2=RESTRICTED_ERC1404, 3=PERMISSIONED_ERC3643"
  standard: Int!
  "deployed token contract address"
  tokenAddress: Bytes!
  "issuer / initial owner"
  issuer: Bytes!
  name: String!
  symbol: String!
  createdAt: BigInt!
  createdTxHash: Bytes!
}

"""
Per-token fungible holder balance (spec 028 expansion, US10). Indexed from each issued fungible token's Transfer
events via the TokenInstance data-source template (spawned on TokenCreated). Powers the cap table. ERC-721
holders are out of scope here (different Transfer encoding). On subgraph-less networks the frontend disables the
cap table truthfully.
"""
type Holder @entity(immutable: false) {
  "<tokenAddress>-<holderAddress>"
  id: ID!
  "issued token contract"
  token: Bytes!
  "holder address"
  account: Bytes!
  "current balance (raw, token decimals)"
  balance: BigInt!
  firstHeldAt: BigInt!
  lastUpdatedAt: BigInt!
}

"""
Per-token on-chain activity (spec 028 expansion, US12). Indexed from each fungible token's Transfer + admin
events. type ∈ mint | burn | transfer | pause | unpause | freeze | unfreeze | role_granted | role_revoked.
"""
type TokenActivity @entity(immutable: true) {
  "<txHash>-<logIndex>"
  id: ID!
  token: Bytes!
  type: String!
  actor: Bytes!
  from: Bytes
  to: Bytes
  amount: BigInt
  detail: String!
  timestamp: BigInt!
  txHash: Bytes!
}

# ---------------------------------------------------------------------------
# Group Wager Pools (spec 034, address-based redesign). The ZK/Semaphore design
# was removed: pools are now a PUBLIC parallel system. Membership, approvals and
# claims are keyed by REAL WALLET ADDRESS — there is no anonymity primitive and
# no nullifier/commitment. The winner's address IS the claim code. The creator
# proposes a payout matrix keyed by winner address that members approve to a
# fraction-of-joined threshold; the locked matrix preimage is fully indexed here
# so the resolved split is queryable on-chain-sourced. Two-word/BIP-39 nicknames
# are client-side only (FR-009) — the subgraph stores only the language-
# independent integer word indices, never rendered text. Network-scoped per
# deployment. WagerPoolFactory is a UUPS proxy at a stable address; each pool is
# an immutable ERC-1167 clone (indexed via the WagerPool data-source template).
# ---------------------------------------------------------------------------
type Pool @entity(immutable: false) {
  "pool clone address (lowercased hex)"
  id: ID!
  "sequential registry id from the factory"
  poolId: BigInt!
  "pool creator (sole payout proposer)"
  creator: Bytes!
  "buy-in token (USDC) allowlisted for the network"
  token: Bytes!
  "per-member buy-in (token base units)"
  buyIn: BigInt!
  maxMembers: Int!
  "approval threshold in basis points of joined members, (0, 10000]"
  thresholdBips: Int!
  "absolute unix time joining/acceptance closes (mirrors WagerRegistry acceptDeadline)"
  acceptDeadline: BigInt!
  "absolute unix time by which resolution must complete; after it the pool is refund-only"
  resolveDeadline: BigInt!
  "the four BIP-39 word indices identifying the pool (language-independent; the phrase is rendered client-side)"
  wordIndices: [Int!]!
  "0=JoiningOpen 1=JoiningClosed 2=Resolved 3=Cancelled (mirrors on-chain PoolState; events advance it)"
  state: Int!
  memberCount: Int!
  "denominator frozen at close (member count snapshot used for the approval threshold); null while JoiningOpen"
  frozenDenominator: Int
  "gross buy-ins escrowed (buyIn * memberCount), accumulated as members join"
  escrowTotal: BigInt!
  "latest proposed payout-matrix hash (proposalId); null until the creator first proposes"
  currentProposalId: Bytes
  "locked payout-matrix hash (proposalId) once resolved; null otherwise"
  lockedOutcome: Bytes
  createdAt: BigInt!
  createdAtBlock: BigInt!
  createdTxHash: Bytes!
  "block timestamp of the resolving OutcomeLocked, or null while unresolved"
  resolvedAt: BigInt
  members: [PoolMember!]! @derivedFrom(field: "pool")
  proposals: [PoolProposal!]! @derivedFrom(field: "pool")
  claims: [PoolClaim!]! @derivedFrom(field: "pool")
  refunds: [PoolRefund!]! @derivedFrom(field: "pool")
}

"A member who joined a pool by their public wallet address (one Joined event). Mutable so a later Refunded can flip `refunded`."
type PoolMember @entity(immutable: false) {
  "<pool>-<member address>"
  id: ID!
  pool: Pool!
  "the joining wallet (public; the address is the winner's future claim code)"
  member: Bytes!
  "buy-in escrowed at join (snapshot of the pool buyIn)"
  buyIn: BigInt!
  joinedAt: BigInt!
  joinedAtBlock: BigInt!
  joinTxHash: Bytes!
  "true once this member has taken a Refunded payout (cancel/refund-only path)"
  refunded: Boolean!
  refundedAt: BigInt
}

"A creator-proposed payout matrix (one OutcomeProposed event). The matrix maps winner addresses to amounts; the full split is stored as parallel arrays AND as PoolPayoutEntry children so it is queryable per winner. `locked` flips true when the proposal reaches threshold (OutcomeLocked)."
type PoolProposal @entity(immutable: false) {
  "<pool>-<proposalId>"
  id: ID!
  pool: Pool!
  proposalId: Bytes!
  "winner addresses, index-aligned with `amounts` (the payout matrix)"
  winners: [Bytes!]!
  "payout amounts (token base units), index-aligned with `winners`"
  amounts: [BigInt!]!
  "number of payout entries in the matrix"
  entryCount: Int!
  "sum of all entry amounts (should equal the pool escrow at lock)"
  totalPayout: BigInt!
  "count of member approvals seen for this proposal"
  approvalCount: Int!
  "true once the proposal locked as the resolved outcome"
  locked: Boolean!
  proposedAt: BigInt!
  proposedTxHash: Bytes!
  "block timestamp the outcome locked, or null while unresolved"
  lockedAt: BigInt
  entries: [PoolPayoutEntry!]! @derivedFrom(field: "proposal")
  approvals: [PoolApproval!]! @derivedFrom(field: "proposal")
}

"One row of a proposal's payout matrix (winner + amount), for per-winner queryability. Immutable — the matrix is fixed at proposal time."
type PoolPayoutEntry @entity(immutable: true) {
  "<pool>-<proposalId>-<index>"
  id: ID!
  pool: Pool!
  proposal: PoolProposal!
  "position of this entry in the matrix (also the on-chain claim index)"
  index: Int!
  "winner wallet (their address is the claim code for this share)"
  winner: Bytes!
  "share amount (token base units)"
  amount: BigInt!
}

"A member's approval of a proposed payout matrix (one Approved event). Public: the approving wallet is on-chain."
type PoolApproval @entity(immutable: true) {
  "<pool>-<proposalId>-<member address>"
  id: ID!
  pool: Pool!
  proposal: PoolProposal!
  proposalId: Bytes!
  "the approving member wallet (public)"
  member: Bytes!
  timestamp: BigInt!
  txHash: Bytes!
}

"A settled winning share paid out of a resolved pool (one Claimed event)."
type PoolClaim @entity(immutable: true) {
  "<txHash>-<logIndex>"
  id: ID!
  pool: Pool!
  "the winner (their address was the claim code)"
  winner: Bytes!
  "recipient the winner chose to receive the funds (may differ from winner)"
  recipient: Bytes!
  amount: BigInt!
  timestamp: BigInt!
  txHash: Bytes!
}

"A buy-in returned to a member (one Refunded event) on the cancel / refund-only path."
type PoolRefund @entity(immutable: true) {
  "<txHash>-<logIndex>"
  id: ID!
  pool: Pool!
  member: Bytes!
  amount: BigInt!
  timestamp: BigInt!
  txHash: Bytes!
}

"An allowlist decision for a pool buy-in token (one TokenAllowed event from the factory). Lets the create-pool flow list allowed tokens without an eth_getLogs scan."
type PoolAllowedToken @entity(immutable: false) {
  "token address (lowercased hex)"
  id: ID!
  token: Bytes!
  "current allowlist state (last TokenAllowed wins)"
  allowed: Boolean!
  updatedAt: BigInt!
  updatedTxHash: Bytes!
}
