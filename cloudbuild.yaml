steps:
  # Build the Docker image
  # Note: VITE_PINATA_JWT is NOT passed as a build arg - it's injected at runtime
  # via Cloud Run environment variable from Secret Manager
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '--build-arg'
      - 'VITE_WALLETCONNECT_PROJECT_ID=c30d7d7a8d575fe3dcc72ed55e5b287e'
      - '--build-arg'
      - 'VITE_APP_URL=https://fairwins.app'
      - '--build-arg'
      # Gasless relayer (spec 036). The SPA probes this and self-submits if it's down (never-stranded).
      - 'VITE_RELAYER_URL=https://relay.fairwins.app'
      - '--build-arg'
      - 'VITE_NETWORK_ID=137'
      - '--build-arg'
      - 'VITE_RPC_URL=https://polygon-bor-rpc.publicnode.com'
      - '--build-arg'
      - 'VITE_IPFS_GATEWAY=https://gateway.pinata.cloud'
      # v2 WagerRegistry subgraph (Spec 017 / #707). Build-time only: Vite inlines
      # VITE_* at `npm run build`, so this is baked into the bundle — NOT a Cloud Run
      # runtime var. Public, non-secret URL. Must match VITE_NETWORK_ID above
      # (137 = Polygon -> fairwins-polygon). Studio dev query endpoint (rate-limited);
      # for production traffic, publish to the decentralized net + proxy the keyed
      # gateway URL via nginx (see the VITE_PINATA_JWT pattern).
      - '--build-arg'
      - 'VITE_SUBGRAPH_URL=https://api.studio.thegraph.com/query/1755381/fairwins-polygon/v0.2.0'
      - '--build-arg'
      - 'VITE_WAGER_SOURCE=subgraph'
      # Passkey smart accounts (spec 041): self-hosted alto ERC-4337 bundler, colocated with the
      # relay gateway (SC-009). Baked in at build; passkeyConfig(137) is null without it, so passkey
      # accounts stay disabled on Polygon until this is set. EntryPoint v0.6; FairWins sponsors no gas.
      - '--build-arg'
      - 'VITE_BUNDLER_URLS_POLYGON=https://fairwins-alto-bundler-266380754692.us-central1.run.app'
      - '-t'
      - 'us-central1-docker.pkg.dev/chippr-bots-site-wp/cloud-run-source-deploy/prediction-dao-research/prediction-dao-research:$COMMIT_SHA'
      - '-t'
      - 'us-central1-docker.pkg.dev/chippr-bots-site-wp/cloud-run-source-deploy/prediction-dao-research/prediction-dao-research:latest'
      - '.'

  # Push the image to Artifact Registry
  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', '--all-tags', 'us-central1-docker.pkg.dev/chippr-bots-site-wp/cloud-run-source-deploy/prediction-dao-research/prediction-dao-research']

  # Deploy to Cloud Run
  # The VITE_PINATA_JWT environment variable is already configured in Cloud Run
  # to be pulled from Secret Manager at runtime.
  # ORIGIN_LOCK_SECRET (Spec 007 origin lock, FR-008) is likewise configured on the
  # Cloud Run service from Secret Manager — see infra/cloudflare/origin-lock.md. It is
  # intentionally NOT set here so deploys don't fail before the secret exists; once it is
  # created, it can be wired declaratively with:
  #   - '--update-secrets'
  #   - 'ORIGIN_LOCK_SECRET=origin-lock-secret:latest'
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - 'prediction-dao-research'
      - '--image'
      - 'us-central1-docker.pkg.dev/chippr-bots-site-wp/cloud-run-source-deploy/prediction-dao-research/prediction-dao-research:$COMMIT_SHA'
      - '--region'
      - 'us-central1'
      - '--platform'
      - 'managed'
      - '--allow-unauthenticated'

  # --- Alto ERC-4337 bundler origin-lock ingress (spec 041 SC-009) --------------------------------
  # The bundler is a MULTI-container service (nginx origin-lock ingress + alto sidecar), so it is
  # rolled out with `gcloud run services replace` of the full 2-container spec — a single-container
  # `gcloud run deploy` (like the SPA step above) would drop the alto sidecar. Build the nginx image,
  # then replace the service pinned to this commit. The alto sidecar env is reconciled to live in
  # services/alto-bundler/deploy/service.yaml; the origin lock arms itself iff ORIGIN_LOCK_SECRET is
  # present (fail-open). NOTE: this redeploys the bundler on every main merge — acceptable for a
  # low-traffic bundler with a Secret-Manager executor key; add a path-filtered trigger later to scope it.
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '-t'
      - 'us-central1-docker.pkg.dev/chippr-bots-site-wp/cloud-run-source-deploy/alto-bundler-nginx:$COMMIT_SHA'
      - '-t'
      - 'us-central1-docker.pkg.dev/chippr-bots-site-wp/cloud-run-source-deploy/alto-bundler-nginx:latest'
      - 'services/alto-bundler/nginx'
  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', '--all-tags', 'us-central1-docker.pkg.dev/chippr-bots-site-wp/cloud-run-source-deploy/alto-bundler-nginx']
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: bash
    args:
      - '-c'
      - |
        sed "s|alto-bundler-nginx:latest|alto-bundler-nginx:$COMMIT_SHA|" \
          services/alto-bundler/deploy/service.yaml > /workspace/alto-bundler.rendered.yaml
        gcloud run services replace /workspace/alto-bundler.rendered.yaml --region us-central1 --quiet

  # --- Relay gateway (spec 036) — NOT built or deployed here -----------------------------------
  # The production relayer is a 3-CONTAINER Cloud Run service (policy gateway + from-source OZ
  # Relayer engine + redis) wired to a KMS-signed gas key. A single-container `gcloud run deploy`
  # from CI would CLOBBER it (drop the engine + redis sidecars), so the relayer is managed
  # OUT-OF-BAND (built from source, deployed via `gcloud run services replace`). See
  # docs/architecture/relayer-infrastructure.md and docs/runbooks/relayer-mordor-deploy.md.

images:
  - 'us-central1-docker.pkg.dev/chippr-bots-site-wp/cloud-run-source-deploy/prediction-dao-research/prediction-dao-research:$COMMIT_SHA'
  - 'us-central1-docker.pkg.dev/chippr-bots-site-wp/cloud-run-source-deploy/prediction-dao-research/prediction-dao-research:latest'

options:
  logging: CLOUD_LOGGING_ONLY
