apiVersion: serving.knative.dev/v1
kind: Service
metadata:
  name: fairwins-relay-gateway
  labels:
    cloud.googleapis.com/location: us-central1
spec:
  template:
    metadata:
      annotations:
        autoscaling.knative.dev/minScale: "1"
        autoscaling.knative.dev/maxScale: "1"
        run.googleapis.com/cpu-throttling: "false"
        run.googleapis.com/startup-cpu-boost: "true"
        run.googleapis.com/container-dependencies: '{"engine":["redis"]}'
    spec:
      serviceAccountName: fairwins-relay-engine@chippr-bots-site-wp.iam.gserviceaccount.com
      containers:
        # ---- ingress: FairWins policy gateway (public, port 8788) ----
        - name: gateway
          # predict-057: adds the /v1/polymarket/* Predict proxy (spec 057) on top of the 055/056 OpenSea routes
          image: us-central1-docker.pkg.dev/chippr-bots-site-wp/cloud-run-source-deploy/prediction-dao-research/fairwins-relay-gateway:predict-057
          ports:
            - name: http1
              containerPort: 8788
          env:
            # PORT is injected by Cloud Run from containerPort (8788) — must not be set here.
            - name: ENABLED_CHAIN_IDS
              value: "63,137"
            - name: ALLOWED_ORIGINS
              value: "https://fairwins.app"
            - name: ENGINE_URL
              value: "http://localhost:8080"
            - name: ENGINE_RELAYER_ID_63
              value: "mordor-63"
            - name: GAS_WALLET_63
              value: "0xf505d95F62bEE94437C112d3D64ee7Df0Fa973aC"
            - name: RPC_URLS_63
              value: "https://rpc.mordor.etccooperative.org,https://geth-mordor.etc-network.info"
            - name: ENGINE_RELAYER_ID_137
              value: "polygon-137"
            - name: GAS_WALLET_137
              value: "0x3BB28b184b8a748dE22aBD076634F85adADA82db"
            - name: RPC_URLS_137
              value: "https://polygon-bor-rpc.publicnode.com,https://polygon.llamarpc.com"
            - name: ORIGIN_AUTH_SECRET
              valueFrom:
                secretKeyRef: { name: origin-lock-secret, key: latest }
            - name: WEBHOOK_SHARED_SECRET
              valueFrom:
                secretKeyRef: { name: relay-webhook-secret, key: "2" }
            - name: ENGINE_API_KEY
              valueFrom:
                secretKeyRef: { name: relay-engine-api-key, key: "2" }
            # Sponsored paymaster (spec 050) — MUST stay in sync with live; omitting these
            # disables Polygon sponsorship on a 'services replace'. (Full manifest<->live
            # reconciliation is tracked by #895; the collectibles deploy used a targeted
            # 'gcloud run services update --container gateway' to avoid clobbering these.)
            - name: PAYMASTER_ADDRESS_137
              value: "0xe14554D14eB5DeC47f7824ebeeDa6C9f3A50d105"
            - name: PM_SIGNER_KMS_KEY
              value: "projects/chippr-bots-site-wp/locations/us-central1/keyRings/fairwins-relayer/cryptoKeys/paymaster-signer-polygon/cryptoKeyVersions/1"
            # Collectibles proxy (spec 055 read + spec 056 sell): OpenSea API v2 key for /v1/opensea/*.
            # Optional — if the secret is absent the routes fail closed (503
            # collectibles_unconfigured) and the SPA hides the Collect tab.
            - name: OPENSEA_API_KEY
              valueFrom:
                secretKeyRef: { name: OPENSEA_API_KEY, key: latest }
            # FairWins referral/affiliate beneficiary of OpenSea's OWN reward (spec 056). PUBLIC address,
            # not a secret. Empty => attribution off (safe default); set the address to turn it on. Never
            # a surcharge — it only records FairWins with OpenSea's own referral program.
            - name: OPENSEA_REFERRAL_ADDRESS
              value: ""
            # Predict / Polymarket proxy (spec 057): CLOB API key + L2 creds for /v1/polymarket/*.
            # Optional — absent secrets fail closed (503 predict_unconfigured) and the SPA hides the
            # Predict tab. The L2 creds are derived once offline via L1, so no order-signing key here.
            - name: POLYMARKET_API_KEY
              valueFrom:
                secretKeyRef: { name: POLYMARKET_API_KEY, key: latest }
            - name: POLYMARKET_API_SECRET
              valueFrom:
                secretKeyRef: { name: POLYMARKET_API_SECRET, key: latest }
            - name: POLYMARKET_API_PASSPHRASE
              valueFrom:
                secretKeyRef: { name: POLYMARKET_API_PASSPHRASE, key: latest }
            # The operator wallet the API creds belong to (POLY_ADDRESS header). PUBLIC address.
            - name: POLYMARKET_API_ADDRESS
              value: ""
            # FairWins builder code (spec 057). PUBLIC bytes32, not a secret. Empty => orders post
            # unattributed (never stranded). The builder fee is additive and disclosed honestly in the UI.
            - name: POLYMARKET_BUILDER_CODE
              value: "0x6e0316783960e149b53466f0f2c5fdbaf5ce11ba15669491de980f6dedc493a3"
            - name: POLYMARKET_BUILDER_TAKER_FEE_BPS
              value: "50"
            - name: POLYMARKET_BUILDER_MAKER_FEE_BPS
              value: "0"
          resources:
            limits: { cpu: "1", memory: 512Mi }
        # ---- sidecar: OZ Relayer engine (localhost:8080) ----
        - name: engine
          image: us-central1-docker.pkg.dev/chippr-bots-site-wp/cloud-run-source-deploy/prediction-dao-research/fairwins-relay-engine:multichain-v1.5.0
          env:
            - name: IN_DOCKER
              value: "true"
            - name: APP_PORT
              value: "8080"
            - name: METRICS_ENABLED
              value: "false"
            - name: LOG_LEVEL
              value: "info"
            - name: REDIS_URL
              value: "redis://localhost:6379"
            - name: GCP_PRIVATE_KEY_ID
              value: "4f206bc79b3f42976c9c49a30d485e3b304b750f"
            - name: GCP_CLIENT_EMAIL
              value: "fairwins-relay-engine@chippr-bots-site-wp.iam.gserviceaccount.com"
            - name: API_KEY
              valueFrom:
                secretKeyRef: { name: relay-engine-api-key, key: "2" }
            - name: WEBHOOK_SIGNING_KEY
              valueFrom:
                secretKeyRef: { name: relay-webhook-secret, key: "2" }
            - name: GCP_PRIVATE_KEY
              valueFrom:
                secretKeyRef: { name: relay-engine-gcp-private-key, key: latest }
          # No startup probe on the engine: nothing depends on it at startup (the gateway serves
          # collectibles/paymaster/status without it), so probe-gating the instance on the engine's
          # ~25s boot would slow every cold start to ~26s. The engine still boots after redis;
          # gasless intents self-submit until it is up (never-stranded). Cold start: ~26s -> ~2s.
          resources:
            limits: { cpu: 800m, memory: 512Mi }
        # ---- sidecar: ephemeral redis (localhost:6379) ----
        - name: redis
          image: redis:7-alpine
          args: ["redis-server", "--save", "", "--appendonly", "no"]
          startupProbe:
            tcpSocket: { port: 6379 }
            initialDelaySeconds: 2
            periodSeconds: 3
            timeoutSeconds: 2
            failureThreshold: 20
          resources:
            limits: { cpu: 200m, memory: 256Mi }
  traffic:
    - percent: 100
      latestRevision: true
